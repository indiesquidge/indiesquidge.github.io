<!DOCTYPE html>
<html>

<link rel="stylesheet" type="text/css" href="styles.css">

<style>
  @keyframes fromCenter {
    from {
      transform: translate(-50%, -50%);
    }
  }

  .particle {
    position: absolute;
    left: var(--click-x);
    top: var(--click-y);
    width: 10px;
    height: 10px;
    background: lightskyblue;
    border-radius: 50%;
    animation:
      fadeToTransparent var(--fade-duration) forwards,
      fromCenter 500ms;
  }
</style>

<head>
  <title>Austin Wood</title>
</head>

<body>
  <div id="particleContainer">
    <h1 class="particleHeader">Austin Wood</h1>
  </div>
</body>

<script type="text/javascript" src="./index.js"></script>

</html>
